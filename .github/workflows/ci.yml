name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: 22
  DATABASE_URL: postgresql://prisma:prisma@localhost:5432/smartclinic_test
  JWT_SECRET: ci-test-secret-not-for-production-use-openssl-rand-hex-32
  CALENDAR_INTERNAL_SECRET: ci-internal-secret-for-testing
  CALENDAR_RETRY_ENABLED: true
  CALENDAR_RETRY_BATCH_SIZE: 10
  NODE_ENV: test
  LOG_LEVEL: silent

jobs:
  lint-and-typecheck:
    name: Lint & TypeScript
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: smartclinic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - run: npx tsc --noEmit

      - run: npm run lint -- --no-cache
        continue-on-error: true

  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: smartclinic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - run: npx vitest run --coverage --reporter=verbose
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          CALENDAR_INTERNAL_SECRET: ${{ env.CALENDAR_INTERNAL_SECRET }}
          CALENDAR_RETRY_ENABLED: ${{ env.CALENDAR_RETRY_ENABLED }}
          CALENDAR_RETRY_BATCH_SIZE: ${{ env.CALENDAR_RETRY_BATCH_SIZE }}
          NODE_ENV: ${{ env.NODE_ENV }}
          LOG_LEVEL: ${{ env.LOG_LEVEL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: prisma
          POSTGRES_PASSWORD: prisma
          POSTGRES_DB: smartclinic_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}

      - run: npm run build
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - run: npx playwright install chromium

      - run: npx playwright test
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}
          CALENDAR_INTERNAL_SECRET: ${{ env.CALENDAR_INTERNAL_SECRET }}
          CALENDAR_RETRY_ENABLED: ${{ env.CALENDAR_RETRY_ENABLED }}
          NODE_ENV: production
          LOG_LEVEL: ${{ env.LOG_LEVEL }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      - run: npx prisma generate

      - run: npm run build

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: smartclinic:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
